<!doctype html>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useMemo, useState } = React;

    const SCOPES = [
      "https://www.googleapis.com/auth/calendar.events",
      "https://www.googleapis.com/auth/calendar.readonly",
      "https://www.googleapis.com/auth/gmail.send",
      "https://www.googleapis.com/auth/documents",
      "https://www.googleapis.com/auth/drive.file",
      "https://www.googleapis.com/auth/spreadsheets"
    ].join(" ");

    const CATEGORIES = [
      { id: "spor", label: "Spor / Hareket", emoji: "🏃", color: "#4ade80", googleColorId: "2" },
      { id: "is", label: "İş / Proje", emoji: "💼", color: "#60a5fa", googleColorId: "9" },
      { id: "kisisel", label: "Kişisel Gelişim", emoji: "📚", color: "#f59e0b", googleColorId: "5" },
      { id: "yemek", label: "Yemek / Mola", emoji: "☕", color: "#fb923c", googleColorId: "6" },
      { id: "sosyal", label: "Sosyal", emoji: "👥", color: "#a78bfa", googleColorId: "3" },
      { id: "diger", label: "Diğer", emoji: "✦", color: "#94a3b8", googleColorId: "8" }
    ];

    const EMPTY_BLOCK = {
      id: "",
      title: "",
      start: "08:00",
      end: "09:00",
      category: "diger",
      note: "",
      status: null,
      calendarEventId: null,
      source: "local"
    };

    const EMPTY_PRODUCT = {
      id: "",
      name: "",
      socialUrl: "",
      productUrl: "",
      marketplace: "",
      viralScore: "",
      potential: "Orta",
      notes: "",
      createdAt: ""
    };

    const READY_TEMPLATES = [
      {
        id: "standart-gun",
        name: "Standart Gün",
        blocks: [
          { title: "Spor", start: "08:00", end: "09:00", category: "spor", note: "" },
          { title: "Burner", start: "10:00", end: "11:30", category: "kisisel", note: "Burner / Instagram–TikTok" },
          { title: "Yapay Zeka Eğitim", start: "11:45", end: "13:00", category: "kisisel", note: "Yapay Zeka Kreatif Eğitimi" },
          { title: "Burner", start: "13:30", end: "14:45", category: "kisisel", note: "Burner / Instagram–TikTok" },
          { title: "Günlük Kargo Teslim", start: "15:00", end: "16:00", category: "is", note: "Kargo Teslimi" },
          { title: "Kreatif Hazırlama / Patila", start: "16:00", end: "17:30", category: "is", note: "Patila için kreatifler hazırla" },
          { title: "Berkan 1-1", start: "18:30", end: "18:55", category: "kisisel", note: "" }
        ]
      }
    ];

    function todayISO() {
      return new Date().toISOString().slice(0, 10);
    }

    function nowTR() {
      return new Date().toLocaleString("tr-TR");
    }

    function uid() {
      return crypto?.randomUUID?.() || Math.random().toString(36).slice(2, 11);
    }

    function storageGet(key, fallback) {
      try {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : fallback;
      } catch {
        return fallback;
      }
    }

    function storageSet(key, value) {
      localStorage.setItem(key, JSON.stringify(value));
    }

    function toMinutes(time) {
      const [h, m] = time.split(":").map(Number);
      return h * 60 + m;
    }

    function minutesDiff(start, end) {
      return toMinutes(end) - toMinutes(start);
    }

    function durationText(start, end) {
      const diff = minutesDiff(start, end);
      if (diff <= 0) return "—";
      const h = Math.floor(diff / 60);
      const m = diff % 60;
      if (!h) return `${m}dk`;
      if (!m) return `${h}s`;
      return `${h}s ${m}dk`;
    }

    function categoryById(id) {
      return CATEGORIES.find(c => c.id === id) || CATEGORIES[CATEGORIES.length - 1];
    }

    function dateTimeForGoogle(date, time) {
      return `${date}T${time}:00+03:00`;
    }

    function formatDateTR(date) {
      return new Date(`${date}T12:00:00+03:00`).toLocaleDateString("tr-TR", {
        weekday: "long",
        day: "numeric",
        month: "long",
        year: "numeric"
      });
    }

    function encodeBase64UrlUnicode(text) {
      const bytes = new TextEncoder().encode(text);
      let binary = "";
      bytes.forEach(b => binary += String.fromCharCode(b));
      return btoa(binary).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
    }

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function hydrateTemplateBlocks(blocks) {
      return blocks.map(b => ({
        ...EMPTY_BLOCK,
        ...b,
        id: uid(),
        status: null,
        calendarEventId: null,
        source: "template"
      }));
    }

    function hasOverlap(blocks, candidate) {
      const start = toMinutes(candidate.start);
      const end = toMinutes(candidate.end);
      return blocks.some(b => {
        if (b.id === candidate.id) return false;
        const bs = toMinutes(b.start);
        const be = toMinutes(b.end);
        return start < be && end > bs;
      });
    }

    function cleanCalendarTitle(summary = "") {
      return summary.replace(/^[^\p{L}\p{N}]+/u, "").trim() || summary;
    }

    function googleTimeToHHMM(value) {
      if (!value) return "00:00";
      const d = new Date(value);
      return `${String(d.getHours()).padStart(2, "0")}:${String(d.getMinutes()).padStart(2, "0")}`;
    }

    function nextDateISO(date) {
      const d = new Date(`${date}T12:00:00+03:00`);
      d.setDate(d.getDate() + 1);
      return d.toISOString().slice(0, 10);
    }

    async function apiFetch(url, accessToken, options = {}) {
      const response = await fetch(url, {
        ...options,
        headers: {
          Authorization: `Bearer ${accessToken}`,
          "Content-Type": "application/json",
          ...(options.headers || {})
        }
      });

      const text = await response.text();
      const data = text ? JSON.parse(text) : null;

      if (!response.ok) {
        const message = data?.error?.message || response.statusText || "Google API hatası";
        throw new Error(message);
      }

      return data;
    }

    function useGoogleIdentity(clientId, notify) {
      const [ready, setReady] = useState(false);
      const [accessToken, setAccessToken] = useState("");
      const [tokenClient, setTokenClient] = useState(null);

      useEffect(() => {
        if (!clientId) {
          setReady(false);
          setAccessToken("");
          setTokenClient(null);
          return;
        }

        const existing = document.querySelector("script[data-google-identity]");

        function init() {
          if (!window.google?.accounts?.oauth2) return;

          const client = window.google.accounts.oauth2.initTokenClient({
            client_id: clientId,
            scope: SCOPES,
            callback: response => {
              if (response?.access_token) {
                setAccessToken(response.access_token);
                notify("Google hesabına bağlandı ✓", "success");
              } else {
                notify("Google bağlantısı tamamlanamadı", "warning");
              }
            }
          });

          setTokenClient(client);
          setReady(true);
        }

        if (existing) {
          init();
          return;
        }

        const script = document.createElement("script");
        script.src = "https://accounts.google.com/gsi/client";
        script.async = true;
        script.defer = true;
        script.dataset.googleIdentity = "true";
        script.onload = init;
        script.onerror = () => notify("Google Identity script yüklenemedi", "error");
        document.body.appendChild(script);
      }, [clientId]);

      function signIn() {
        if (!clientId) return notify("Önce Google Client ID gir", "warning");
        if (!ready || !tokenClient) return notify("Google bağlantısı henüz hazır değil", "warning");
        tokenClient.requestAccessToken({ prompt: accessToken ? "" : "consent" });
      }

      function signOut() {
        if (accessToken && window.google?.accounts?.oauth2) {
          window.google.accounts.oauth2.revoke(accessToken);
        }
        setAccessToken("");
        notify("Google bağlantısı kesildi", "success");
      }

      return { ready, connected: Boolean(accessToken), accessToken, signIn, signOut };
    }

    async function analyzeNoteWithAI({ apiKey, model, text, imageFile }) {
      if (!apiKey) throw new Error("OpenAI API Key eksik");

      const content = [
        {
          type: "text",
          text: "Türkçe yanıt ver. Gönderilen kitap sayfası, metin, söz veya alıntıyı incele. Önce varsa yazıyı çıkar. Sonra kısa özet, ana fikir ve kişisel not önerisi üret."
        }
      ];

      if (text?.trim()) {
        content.push({ type: "text", text: `Kullanıcının eklediği metin:\n${text}` });
      }

      if (imageFile) {
        const dataUrl = await fileToBase64(imageFile);
        content.push({ type: "image_url", image_url: { url: dataUrl } });
      }

      const response = await fetch("https://api.openai.com/v1/chat/completions", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          Authorization: `Bearer ${apiKey}`
        },
        body: JSON.stringify({
          model: model || "gpt-4o-mini",
          messages: [{ role: "user", content }],
          temperature: 0.35
        })
      });

      const data = await response.json();
      if (!response.ok) throw new Error(data?.error?.message || "AI analiz hatası");
      return data.choices?.[0]?.message?.content || "Analiz alınamadı.";
    }

    async function createGoogleDoc({ accessToken, title, content }) {
      const doc = await apiFetch("https://docs.googleapis.com/v1/documents", accessToken, {
        method: "POST",
        body: JSON.stringify({ title })
      });

      await apiFetch(`https://docs.googleapis.com/v1/documents/${doc.documentId}:batchUpdate`, accessToken, {
        method: "POST",
        body: JSON.stringify({
          requests: [{ insertText: { location: { index: 1 }, text: content } }]
        })
      });

      return doc;
    }

    async function createProductSpreadsheet(accessToken) {
      const sheet = await apiFetch("https://sheets.googleapis.com/v4/spreadsheets", accessToken, {
        method: "POST",
        body: JSON.stringify({
          properties: { title: "Günüm Ürün Burner" },
          sheets: [{ properties: { title: "Ürünler" } }]
        })
      });

      await appendProductToSheet({
        accessToken,
        spreadsheetId: sheet.spreadsheetId,
        product: {
          createdAt: "Tarih",
          name: "Ürün Adı",
          socialUrl: "Sosyal Medya Linki",
          productUrl: "Ürün / Tedarik Linki",
          marketplace: "Pazaryeri",
          viralScore: "Viral Puanı",
          potential: "Potansiyel",
          notes: "Not"
        }
      });

      return sheet.spreadsheetId;
    }

    async function appendProductToSheet({ accessToken, spreadsheetId, product }) {
      const values = [[
        product.createdAt,
        product.name,
        product.socialUrl,
        product.productUrl,
        product.marketplace,
        product.viralScore,
        product.potential,
        product.notes
      ]];

      return apiFetch(
        `https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/Ürünler!A:H:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS`,
        accessToken,
        { method: "POST", body: JSON.stringify({ values }) }
      );
    }

    async function createPlanSpreadsheet(accessToken) {
      const sheet = await apiFetch("https://sheets.googleapis.com/v4/spreadsheets", accessToken, {
        method: "POST",
        body: JSON.stringify({
          properties: { title: "Günüm Günlük Plan Takibi" },
          sheets: [{ properties: { title: "Günlük Plan" } }]
        })
      });

      await appendPlanBlockToSheet({
        accessToken,
        spreadsheetId: sheet.spreadsheetId,
        date: "Tarih",
        block: {
          title: "Aktivite",
          start: "Başlangıç",
          end: "Bitiş",
          category: "Kategori",
          note: "Not",
          status: "Durum",
          calendarEventId: "Calendar Event ID"
        },
        headerMode: true
      });

      return sheet.spreadsheetId;
    }

    async function appendPlanBlockToSheet({ accessToken, spreadsheetId, date, block, headerMode = false }) {
      const cat = headerMode ? { label: block.category } : categoryById(block.category);

      const values = [[
        date,
        block.start,
        block.end,
        durationText(block.start, block.end),
        block.title,
        cat.label,
        block.note || "",
        block.status === true ? "Tamamlandı" : block.status === false ? "Kaçırıldı" : "Bekliyor",
        block.calendarEventId || "",
        block.source || "",
        nowTR()
      ]];

      return apiFetch(
        `https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/Günlük Plan!A:K:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS`,
        accessToken,
        { method: "POST", body: JSON.stringify({ values }) }
      );
    }

    function App() {
      const [screen, setScreen] = useState("plan");
      const [date, setDate] = useState(todayISO());
      const [blocks, setBlocks] = useState(() => storageGet(`plan_${todayISO()}`, []));
      const [notes, setNotes] = useState(() => storageGet("notes", []));
      const [products, setProducts] = useState(() => storageGet("products", []));
      const [customTemplates, setCustomTemplates] = useState(() => storageGet("customTemplates", []));
      const [defaultTemplateId, setDefaultTemplateId] = useState(() => storageGet("defaultTemplateId", "standart-gun"));
      const [settings, setSettings] = useState(() => storageGet("settings", {
        clientId: "",
        email: "",
        openAiKey: "",
        aiModel: "gpt-4o-mini",
        productSheetId: "",
        planSheetId: "",
        autoApplyDefaultPlan: false,
        autoSavePlanToSheet: true
      }));
      const [modalBlock, setModalBlock] = useState(null);
      const [toast, setToast] = useState(null);
      const [loading, setLoading] = useState(false);
      const [reportView, setReportView] = useState("overview");

      function notify(message, type = "success") {
        setToast({ message, type });
        clearTimeout(window.__gunumToastTimer);
        window.__gunumToastTimer = setTimeout(() => setToast(null), 3200);
      }

      const google = useGoogleIdentity(settings.clientId, notify);

      useEffect(() => {
        const saved = storageGet(`plan_${date}`, []);

        if (saved.length === 0 && settings.autoApplyDefaultPlan) {
          const allTemplates = [...READY_TEMPLATES, ...customTemplates];
          const selected = allTemplates.find(t => t.id === defaultTemplateId) || READY_TEMPLATES[0];
          setBlocks(hydrateTemplateBlocks(selected.blocks));
          return;
        }

        setBlocks(saved);
      }, [date, settings.autoApplyDefaultPlan, customTemplates, defaultTemplateId]);

      useEffect(() => storageSet(`plan_${date}`, blocks), [blocks, date]);
      useEffect(() => storageSet("notes", notes), [notes]);
      useEffect(() => storageSet("products", products), [products]);
      useEffect(() => storageSet("customTemplates", customTemplates), [customTemplates]);
      useEffect(() => storageSet("defaultTemplateId", defaultTemplateId), [defaultTemplateId]);
      useEffect(() => storageSet("settings", settings), [settings]);

      const report = useMemo(() => {
        const completed = blocks.filter(b => b.status === true).length;
        const missed = blocks.filter(b => b.status === false).length;
        const total = blocks.length;
        const score = total ? Math.round((completed / total) * 100) : 0;
        const totalMinutes = blocks.reduce((sum, b) => sum + Math.max(0, minutesDiff(b.start, b.end)), 0);
        return { completed, missed, total, score, totalMinutes, notes: notes.length, products: products.length };
      }, [blocks, notes, products]);

      function shiftDay(delta) {
        const d = new Date(`${date}T12:00:00+03:00`);
        d.setDate(d.getDate() + delta);
        setDate(d.toISOString().slice(0, 10));
      }

      function openNewBlock() {
        const last = [...blocks].sort((a, b) => a.end.localeCompare(b.end)).at(-1);
        const start = last?.end || "08:00";
        const endMinutes = Math.min(toMinutes(start) + 60, 23 * 60 + 59);
        const end = `${String(Math.floor(endMinutes / 60)).padStart(2, "0")}:${String(endMinutes % 60).padStart(2, "0")}`;
        setModalBlock({ ...EMPTY_BLOCK, id: uid(), start, end });
      }

      function applyTemplate(templateId = defaultTemplateId) {
        const allTemplates = [...READY_TEMPLATES, ...customTemplates];
        const selected = allTemplates.find(t => t.id === templateId) || READY_TEMPLATES[0];
        setBlocks(hydrateTemplateBlocks(selected.blocks));
        setDefaultTemplateId(selected.id);
        notify(`“${selected.name}” şablonu bugüne uygulandı ✓`);
      }

      function saveTodayAsTemplate() {
        if (!blocks.length) return notify("Şablon kaydetmek için önce aktivite ekle", "warning");

        const name = prompt("Şablon adı:", "Benim Standart Günüm");
        if (!name) return;

        const template = {
          id: uid(),
          name: name.trim(),
          createdAt: nowTR(),
          blocks: blocks.map(({ id, status, calendarEventId, source, ...b }) => ({ ...b }))
        };

        setCustomTemplates(prev => [template, ...prev]);
        setDefaultTemplateId(template.id);
        notify("Şablon kaydedildi ve varsayılan yapıldı ✓");
      }

      function toggleAutoDefaultPlan() {
        setSettings(prev => ({ ...prev, autoApplyDefaultPlan: !prev.autoApplyDefaultPlan }));
        notify(!settings.autoApplyDefaultPlan ? "Boş günlere otomatik şablon açıldı ✓" : "Otomatik şablon kapatıldı");
      }

      async function importCalendarEvents() {
        if (!google.connected) return notify("Önce Google hesabına bağlan", "warning");

        setLoading(true);
        try {
          const timeMin = `${date}T00:00:00+03:00`;
          const timeMax = `${nextDateISO(date)}T00:00:00+03:00`;

          const params = new URLSearchParams({
            timeMin,
            timeMax,
            singleEvents: "true",
            orderBy: "startTime"
          });

          const data = await apiFetch(
            `https://www.googleapis.com/calendar/v3/calendars/primary/events?${params.toString()}`,
            google.accessToken
          );

          const imported = (data.items || [])
            .filter(ev => ev.start?.dateTime && ev.end?.dateTime)
            .map(ev => ({
              ...EMPTY_BLOCK,
              id: uid(),
              title: cleanCalendarTitle(ev.summary || "Takvim Etkinliği"),
              start: googleTimeToHHMM(ev.start.dateTime),
              end: googleTimeToHHMM(ev.end.dateTime),
              category: "diger",
              note: ev.description || "",
              status: null,
              calendarEventId: ev.id,
              source: "calendar"
            }));

          setBlocks(prev => {
            const existingIds = new Set(prev.map(b => b.calendarEventId).filter(Boolean));
            const onlyNew = imported.filter(b => !existingIds.has(b.calendarEventId));
            const merged = [...prev, ...onlyNew].sort((a, b) => a.start.localeCompare(b.start));

            notify(`${onlyNew.length} takvim etkinliği içeri alındı ✓`);
            return merged;
          });
        } catch (error) {
          notify(`Takvimden alma hatası: ${error.message}`, "error");
        } finally {
          setLoading(false);
        }
      }

      async function saveBlock(block) {
        const normalized = { ...block, title: block.title.trim(), note: block.note.trim() };

        if (!normalized.title) return notify("Başlık boş olamaz", "warning");
        if (minutesDiff(normalized.start, normalized.end) <= 0) return notify("Bitiş saati başlangıçtan sonra olmalı", "warning");
        if (hasOverlap(blocks, normalized)) return notify("Bu saat aralığında başka bir blok var", "warning");

        let savedBlock = normalized;

        if (google.connected) {
          setLoading(true);
          try {
            const cat = categoryById(normalized.category);

            const eventBody = {
              summary: `${cat.emoji} ${normalized.title}`,
              description: normalized.note || "Günüm uygulamasından eklendi",
              start: { dateTime: dateTimeForGoogle(date, normalized.start), timeZone: "Europe/Istanbul" },
              end: { dateTime: dateTimeForGoogle(date, normalized.end), timeZone: "Europe/Istanbul" },
              colorId: cat.googleColorId
            };

            if (normalized.calendarEventId) {
              await apiFetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events/${normalized.calendarEventId}`, google.accessToken, {
                method: "PUT",
                body: JSON.stringify(eventBody)
              });
              notify("Google Calendar etkinliği güncellendi ✓");
            } else {
              const created = await apiFetch("https://www.googleapis.com/calendar/v3/calendars/primary/events", google.accessToken, {
                method: "POST",
                body: JSON.stringify(eventBody)
              });

              savedBlock = { ...normalized, calendarEventId: created.id, source: "calendar" };
              notify("Google Calendar'a eklendi ✓");
            }

            if (settings.autoSavePlanToSheet && settings.planSheetId) {
              await appendPlanBlockToSheet({
                accessToken: google.accessToken,
                spreadsheetId: settings.planSheetId,
                date,
                block: savedBlock
              });
              notify("Calendar + Plan Sheet kaydı tamamlandı ✓");
            }
          } catch (error) {
            notify(`Calendar/Sheet hatası: ${error.message}`, "error");
          } finally {
            setLoading(false);
          }
        }

        setBlocks(prev => {
          const exists = prev.some(b => b.id === savedBlock.id);
          const next = exists ? prev.map(b => b.id === savedBlock.id ? savedBlock : b) : [...prev, savedBlock];
          return next.sort((a, b) => a.start.localeCompare(b.start));
        });

        setModalBlock(null);
      }

      async function deleteBlock(block) {
        if (block.calendarEventId && google.connected) {
          setLoading(true);
          try {
            await apiFetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events/${block.calendarEventId}`, google.accessToken, { method: "DELETE" });
            notify("Google Calendar etkinliği silindi");
          } catch (error) {
            notify(`Calendar silme hatası: ${error.message}`, "error");
          } finally {
            setLoading(false);
          }
        }

        setBlocks(prev => prev.filter(b => b.id !== block.id));
      }

      function setStatus(id, status) {
        setBlocks(prev => prev.map(b => b.id === id ? { ...b, status: b.status === status ? null : status } : b));
      }

      async function saveNote(note) {
        setNotes(prev => [{ ...note, id: uid(), createdAt: nowTR() }, ...prev]);
        notify("Not kaydedildi ✓");
      }

      async function saveNoteToGoogleDoc(note) {
        if (!google.connected) return notify("Önce Google hesabına bağlan", "warning");

        setLoading(true);
        try {
          const title = `Günüm Not — ${note.title || nowTR()}`;
          const content = `${title}\n\nTarih: ${note.createdAt || nowTR()}\n\nOrijinal Metin:\n${note.sourceText || "—"}\n\nAI Özeti:\n${note.aiSummary || "—"}`;

          const doc = await createGoogleDoc({ accessToken: google.accessToken, title, content });

          setNotes(prev => prev.map(n => n.id === note.id ? { ...n, googleDocId: doc.documentId } : n));
          notify("Google Docs'a kaydedildi ✓");
        } catch (error) {
          notify(`Docs hatası: ${error.message}`, "error");
        } finally {
          setLoading(false);
        }
      }

      async function saveProduct(product) {
        const normalized = { ...product, id: uid(), createdAt: nowTR() };
        if (!normalized.name.trim()) return notify("Ürün adı boş olamaz", "warning");

        setProducts(prev => [normalized, ...prev]);

        if (google.connected && settings.productSheetId) {
          setLoading(true);
          try {
            await appendProductToSheet({
              accessToken: google.accessToken,
              spreadsheetId: settings.productSheetId,
              product: normalized
            });
            notify("Ürün Google Sheets'e kaydedildi ✓");
          } catch (error) {
            notify(`Sheets hatası: ${error.message}`, "error");
          } finally {
            setLoading(false);
          }
        } else {
          notify("Ürün yerel olarak kaydedildi ✓");
        }
      }

      async function makeProductSheet() {
        if (!google.connected) return notify("Önce Google hesabına bağlan", "warning");

        setLoading(true);
        try {
          const spreadsheetId = await createProductSpreadsheet(google.accessToken);
          setSettings(prev => ({ ...prev, productSheetId: spreadsheetId }));
          notify("Ürünler için Google Sheet oluşturuldu ✓");
        } catch (error) {
          notify(`Sheet oluşturma hatası: ${error.message}`, "error");
        } finally {
          setLoading(false);
        }
      }

      async function makePlanSheet() {
        if (!google.connected) return notify("Önce Google hesabına bağlan", "warning");

        setLoading(true);
        try {
          const spreadsheetId = await createPlanSpreadsheet(google.accessToken);
          setSettings(prev => ({ ...prev, planSheetId: spreadsheetId }));
          notify("Günlük plan için Google Sheet oluşturuldu ✓");
        } catch (error) {
          notify(`Plan Sheet oluşturma hatası: ${error.message}`, "error");
        } finally {
          setLoading(false);
        }
      }

      async function sendDailyReportEmail() {
        if (!google.connected) return notify("Önce Google hesabına bağlan", "warning");
        if (!settings.email) return notify("Rapor e-posta adresi eksik", "warning");

        setLoading(true);
        try {
          const html = `
            <div style="font-family:Arial,sans-serif;background:#f8fafc;padding:28px;max-width:720px;margin:auto">
              <h1>Günüm Raporu</h1>
              <p>${formatDateTR(date)}</p>
              <ul>
                <li>Planlanan aktivite: ${report.total}</li>
                <li>Tamamlanan: ${report.completed}</li>
                <li>Kaçırılan: ${report.missed}</li>
                <li>Başarı: ${report.score}%</li>
                <li>Toplam not: ${report.notes}</li>
                <li>Toplam ürün fikri: ${report.products}</li>
              </ul>
            </div>
          `;

          const raw = [
            `To: ${settings.email}`,
            "Content-Type: text/html; charset=utf-8",
            "MIME-Version: 1.0",
            `Subject: =?utf-8?B?${encodeBase64UrlUnicode(`Günüm Rapor — ${date}`)}?=`,
            "",
            html
          ].join("\n");

          await apiFetch("https://gmail.googleapis.com/gmail/v1/users/me/messages/send", google.accessToken, {
            method: "POST",
            body: JSON.stringify({ raw: encodeBase64UrlUnicode(raw) })
          });

          notify("Rapor Gmail ile gönderildi ✓");
        } catch (error) {
          notify(`Mail hatası: ${error.message}`, "error");
        } finally {
          setLoading(false);
        }
      }

      return (
        <div className="shell">
          <div className="window">
            <div className="windowBar">
              <span className="dot" style={{ background: "#ff5f57" }}></span>
              <span className="dot" style={{ background: "#febc2e" }}></span>
              <span className="dot" style={{ background: "#28c840" }}></span>
            </div>

            <div className="app">
              {toast && <Toast toast={toast} />}
              {loading && <Loading />}

              <section className="dateBar">
                <button onClick={() => shiftDay(-1)} className="dateButton">‹</button>
                <input value={date} onChange={e => setDate(e.target.value)} type="date" className="dateInput" />
                <button onClick={() => shiftDay(1)} className="dateButton">›</button>
              </section>

              <nav className="tabs">
                {[
                  ["plan", "📋", "Plan"],
                  ["notes", "📸", "Notlar"],
                  ["products", "🛍️", "Ürünler"],
                  ["report", "📊", "Rapor"],
                  ["settings", "⚙️", "Ayarlar"]
                ].map(([id, emoji, label]) => (
                  <button key={id} onClick={() => setScreen(id)} className={`tab ${screen === id ? "active" : ""}`}>
                    <span style={{ fontSize: 22 }}>{emoji}</span>
                    <small>{label}</small>
                  </button>
                ))}
              </nav>

              <main className="main">
                {screen === "plan" && (
                  <PlanScreen
                    blocks={blocks}
                    report={report}
                    onAdd={openNewBlock}
                    onEdit={b => setModalBlock({ ...b })}
                    onDelete={deleteBlock}
                    onStatus={setStatus}
                    onApplyTemplate={applyTemplate}
                    onSaveTemplate={saveTodayAsTemplate}
                    autoDefault={settings.autoApplyDefaultPlan}
                    onToggleAutoDefault={toggleAutoDefaultPlan}
                    templates={[...READY_TEMPLATES, ...customTemplates]}
                    defaultTemplateId={defaultTemplateId}
                    setDefaultTemplateId={setDefaultTemplateId}
                    onImportCalendar={importCalendarEvents}
                    googleConnected={google.connected}
                  />
                )}

                {screen === "notes" && (
                  <NotesScreen
                    notes={notes}
                    setNotes={setNotes}
                    settings={settings}
                    onSave={saveNote}
                    onSaveDoc={saveNoteToGoogleDoc}
                    setLoading={setLoading}
                    notify={notify}
                  />
                )}

                {screen === "products" && (
                  <ProductsScreen
                    products={products}
                    onSave={saveProduct}
                    onDelete={id => setProducts(prev => prev.filter(p => p.id !== id))}
                    makeProductSheet={makeProductSheet}
                    hasSheet={Boolean(settings.productSheetId)}
                  />
                )}

                {screen === "report" && (
                  <ReportScreen
                    notes={notes}
                    products={products}
                    report={report}
                    reportView={reportView}
                    setReportView={setReportView}
                    onSend={sendDailyReportEmail}
                  />
                )}

                {screen === "settings" && (
                  <SettingsScreen
                    settings={settings}
                    setSettings={setSettings}
                    google={google}
                    makeProductSheet={makeProductSheet}
                    makePlanSheet={makePlanSheet}
                  />
                )}
              </main>

              {modalBlock && (
                <BlockModal
                  block={modalBlock}
                  onClose={() => setModalBlock(null)}
                  onSave={saveBlock}
                  loading={loading}
                />
              )}
            </div>
          </div>
        </div>
      );
    }

    function Toast({ toast }) {
      const bg = toast.type === "error" ? "#ef4444" : toast.type === "warning" ? "#f59e0b" : "#22c55e";
      return <div className="toast" style={{ background: bg }}>{toast.message}</div>;
    }

    function Loading() {
      return <div className="loadingOverlay"><div className="loadingBox">İşleniyor...</div></div>;
    }

    function PlanScreen({
      blocks,
      report,
      onAdd,
      onEdit,
      onDelete,
      onStatus,
      onApplyTemplate,
      onSaveTemplate,
      autoDefault,
      onToggleAutoDefault,
      templates,
      defaultTemplateId,
      setDefaultTemplateId,
      onImportCalendar,
      googleConnected
    }) {
      return (
        <div>
          <div className="topRow">
            <span>{blocks.length} aktivite · {Math.floor(report.totalMinutes / 60)}s {report.totalMinutes % 60}dk planlandı</span>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
              <button onClick={onSaveTemplate} className="secondaryButton">💾 Şablon Kaydet</button>
              <button onClick={onImportCalendar} className="greenButton">📥 Takvimden Al</button>
            </div>
          </div>

          <div className="panel">
            <div className="panelTitle">⚡ Gün Şablonu</div>
            <div className="templateControls">
              <select value={defaultTemplateId} onChange={e => setDefaultTemplateId(e.target.value)} className="input">
                {templates.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
              </select>
              <button onClick={() => onApplyTemplate(defaultTemplateId)} className="secondaryButton">Bugüne Uygula</button>
            </div>
            <button
              onClick={onToggleAutoDefault}
              className="secondaryButton"
              style={{
                width: "100%",
                marginTop: 10,
                background: autoDefault ? "#22c55e22" : "#334155",
                color: autoDefault ? "#22c55e" : "#cbd5e1"
              }}
            >
              {autoDefault ? "✓ Boş günlere otomatik uygula açık" : "Boş günlere otomatik uygula"}
            </button>
          </div>

          {!blocks.length ? (
            <Empty icon="🗓️" text="Henüz plan yok. Hazır şablonu bugüne uygulayabilir veya Google Takvim'den alabilirsin." />
          ) : (
            <div className="list">
              {blocks.map(b => (
                <BlockCard
                  key={b.id}
                  block={b}
                  onEdit={() => onEdit(b)}
                  onDelete={() => onDelete(b)}
                  onStatus={onStatus}
                />
              ))}
            </div>
          )}

          <button onClick={onAdd} className="primaryButton">+ Yeni Blok Ekle</button>
        </div>
      );
    }

    function BlockCard({ block, onEdit, onDelete, onStatus }) {
      const cat = categoryById(block.category);
      const borderColor = block.status === true ? "#22c55e" : block.status === false ? "#ef4444" : cat.color;

      return (
        <article className="card" style={{ borderLeftColor, opacity: block.status === false ? 0.72 : 1 }}>
          <div className="statusColumn">
            <button
              onClick={() => onStatus(block.id, true)}
              className="statusButton"
              style={{ borderColor: "#22c55e", background: block.status === true ? "#22c55e" : "transparent" }}
            >✓</button>
            <button
              onClick={() => onStatus(block.id, false)}
              className="statusButton"
              style={{ borderColor: "#ef4444", background: block.status === false ? "#ef4444" : "transparent" }}
            >✕</button>
          </div>

          <div className="cardBody">
            <strong>{cat.emoji} {block.title}</strong>
            <div className="meta">
              {block.start} – {block.end} <span style={{ color: cat.color }}>{durationText(block.start, block.end)}</span>
              {block.calendarEventId ? " 📅" : ""}
              {block.source === "calendar" ? " Google Takvim" : ""}
            </div>
            {block.note && <p className="note">{block.note}</p>}
          </div>

          <div style={{ display: "flex", gap: 6 }}>
            <button onClick={onEdit} className="iconButton">✏️</button>
            <button onClick={onDelete} className="dangerButton">🗑️</button>
          </div>
        </article>
      );
    }

    function BlockModal({ block, onClose, onSave, loading }) {
      const [form, setForm] = useState(block);
      const set = (field, value) => setForm(prev => ({ ...prev, [field]: value }));

      return (
        <div className="modalOverlay">
          <div className="modalBox">
            <div className="modalHeader">
              <h3>{block.title ? "Bloğu Düzenle" : "Yeni Blok"}</h3>
              <button onClick={onClose} className="closeButton">✕</button>
            </div>

            <label className="label">Başlık</label>
            <input value={form.title} onChange={e => set("title", e.target.value)} placeholder="Sabah yürüyüşü..." className="input" />

            <div className="twoCols">
              <div>
                <label className="label">Başlangıç</label>
                <input type="time" value={form.start} onChange={e => set("start", e.target.value)} className="input" />
              </div>
              <div>
                <label className="label">Bitiş</label>
                <input type="time" value={form.end} onChange={e => set("end", e.target.value)} className="input" />
              </div>
            </div>

            <label className="label">Kategori</label>
            <div className="categoryGrid">
              {CATEGORIES.map(c => (
                <button
                  key={c.id}
                  onClick={() => set("category", c.id)}
                  className="categoryPill"
                  style={{
                    borderColor: form.category === c.id ? c.color : "transparent",
                    color: form.category === c.id ? c.color : "#94a3b8",
                    background: form.category === c.id ? `${c.color}22` : "#0f172a"
                  }}
                >
                  {c.emoji} {c.label}
                </button>
              ))}
            </div>

            <label className="label">Not</label>
            <textarea value={form.note} onChange={e => set("note", e.target.value)} rows="3" placeholder="Ek not..." className="input"></textarea>

            <div className="modalFooter">
              <button onClick={onClose} className="cancelButton">İptal</button>
              <button onClick={() => onSave(form)} disabled={loading} className="saveButton">
                {loading ? "Kaydediliyor..." : "Kaydet"}
              </button>
            </div>
          </div>
        </div>
      );
    }

    function NotesScreen({ notes, setNotes, settings, onSave, onSaveDoc, setLoading, notify }) {
      const [title, setTitle] = useState("");
      const [sourceText, setSourceText] = useState("");
      const [imageFile, setImageFile] = useState(null);
      const [aiSummary, setAiSummary] = useState("");

      async function analyze() {
        if (!sourceText.trim() && !imageFile) return notify("Önce metin yaz veya görsel yükle", "warning");

        setLoading(true);
        try {
          const result = await analyzeNoteWithAI({
            apiKey: settings.openAiKey,
            model: settings.aiModel,
            text: sourceText,
            imageFile
          });
          setAiSummary(result);
          notify("AI özeti hazır ✓");
        } catch (error) {
          notify(`AI hatası: ${error.message}`, "error");
        } finally {
          setLoading(false);
        }
      }

      async function saveCurrent() {
        if (!sourceText.trim() && !aiSummary.trim()) return notify("Kaydedilecek not yok", "warning");

        await onSave({
          title: title || "Kitap Notu",
          sourceText,
          aiSummary
        });

        setTitle("");
        setSourceText("");
        setImageFile(null);
        setAiSummary("");
      }

      return (
        <div>
          <div className="topRow"><span>{notes.length} not</span></div>

          <div className="dropBox">
            <div style={{ fontSize: 38 }}>📸</div>
            <strong>Kitap sayfası görseli yükle veya metin yapıştır</strong>
            <input type="file" accept="image/*" onChange={e => setImageFile(e.target.files?.[0] || null)} />
            {imageFile && <span style={{ color: "#60a5fa", fontSize: 12 }}>{imageFile.name}</span>}
          </div>

          <input value={title} onChange={e => setTitle(e.target.value)} placeholder="Not başlığı" className="input" />
          <textarea value={sourceText} onChange={e => setSourceText(e.target.value)} rows="5" placeholder="Okuduğun metni, sözü veya alıntıyı buraya yaz..." className="input" style={{ resize: "vertical", marginTop: 10 }}></textarea>

          <div className="buttonRow">
            <button onClick={analyze} className="primaryButton">✨ AI Özetle</button>
            <button onClick={saveCurrent} className="secondaryButton">💾 Kaydet</button>
          </div>

          {aiSummary && (
            <div className="resultBox">
              <h3>AI Özeti</h3>
              <pre>{aiSummary}</pre>
            </div>
          )}

          {!notes.length ? (
            <Empty icon="📚" text="Henüz not yok. Bir kitap sayfası veya alıntı ekle." />
          ) : (
            <div className="list">
              {notes.map(n => (
                <article key={n.id} className="card">
                  <div className="cardBody">
                    <strong>{n.title}</strong>
                    <div className="meta">{n.createdAt}</div>
                    <p className="note">{n.aiSummary || n.sourceText}</p>
                  </div>
                  <div style={{ display: "flex", gap: 6 }}>
                    <button onClick={() => onSaveDoc(n)} className="secondaryButton">Word</button>
                    <button onClick={() => setNotes(prev => prev.filter(x => x.id !== n.id))} className="dangerButton">🗑️</button>
                  </div>
                </article>
              ))}
            </div>
          )}
        </div>
      );
    }

    function ProductsScreen({ products, onSave, onDelete, makeProductSheet, hasSheet }) {
      const [form, setForm] = useState({ ...EMPTY_PRODUCT });
      const set = (field, value) => setForm(prev => ({ ...prev, [field]: value }));

      function submit() {
        onSave(form);
        setForm({ ...EMPTY_PRODUCT });
      }

      return (
        <div>
          <div className="topRow">
            <span>{products.length} ürün kaydedildi</span>
            <button onClick={makeProductSheet} className="greenButton">{hasSheet ? "Sheets bağlı" : "+ Sheet Oluştur"}</button>
          </div>

          <div className="formCard">
            <label className="label">Ürün adı</label>
            <input value={form.name} onChange={e => set("name", e.target.value)} placeholder="Örn: Lenticular poster" className="input" />

            <label className="label">Sosyal medya linki</label>
            <input value={form.socialUrl} onChange={e => set("socialUrl", e.target.value)} placeholder="TikTok / Instagram / X linki" className="input" />

            <label className="label">Ürün / tedarik linki</label>
            <input value={form.productUrl} onChange={e => set("productUrl", e.target.value)} placeholder="AliExpress / Trendyol / Hepsiburada linki" className="input" />

            <div className="twoCols">
              <div>
                <label className="label">Pazaryeri</label>
                <input value={form.marketplace} onChange={e => set("marketplace", e.target.value)} placeholder="AliExpress" className="input" />
              </div>
              <div>
                <label className="label">Viral puanı</label>
                <input value={form.viralScore} onChange={e => set("viralScore", e.target.value)} placeholder="1-10" className="input" />
              </div>
            </div>

            <label className="label">Potansiyel</label>
            <select value={form.potential} onChange={e => set("potential", e.target.value)} className="input">
              <option>Düşük</option>
              <option>Orta</option>
              <option>Yüksek</option>
              <option>Çok Yüksek</option>
            </select>

            <label className="label">Not</label>
            <textarea value={form.notes} onChange={e => set("notes", e.target.value)} rows="3" placeholder="Neden viral olabilir? Türkiye pazarı uygun mu?" className="input"></textarea>

            <button onClick={submit} className="primaryButton">+ Ürünü Kaydet</button>
          </div>

          {!products.length ? (
            <Empty icon="🛍️" text="Henüz ürün yok. Araştırırken karşılaştığın ürünleri kaydet." />
          ) : (
            <div className="list">
              {products.map(p => (
                <article key={p.id} className="card" style={{ borderLeftColor: p.potential === "Yüksek" || p.potential === "Çok Yüksek" ? "#22c55e" : "#f59e0b" }}>
                  <div className="cardBody">
                    <strong>{p.name}</strong>
                    <div className="meta">{p.createdAt} · {p.marketplace || "Pazaryeri yok"} · Viral: {p.viralScore || "—"} · {p.potential}</div>
                    <p className="note">{p.notes || p.productUrl || p.socialUrl}</p>
                  </div>
                  <button onClick={() => onDelete(p.id)} className="dangerButton">🗑️</button>
                </article>
              ))}
            </div>
          )}
        </div>
      );
    }

    function ReportScreen({ notes, products, report, reportView, setReportView, onSend }) {
      const latestNotes = notes.slice(0, 5);
      const latestProducts = products.slice(0, 5);

      return (
        <div>
          <div className="summaryGrid">
            <SummaryBox label="Tamamlandı" value={report.completed} color="#22c55e" />
            <SummaryBox label="Ürün" value={report.products} color="#60a5fa" />
            <SummaryBox label="Not" value={report.notes} color="#f59e0b" />
          </div>

          <div className="buttonRow">
            <button onClick={() => setReportView("latestProducts")} className="secondaryButton">Son Ürünler</button>
            <button onClick={() => setReportView("latestNotes")} className="secondaryButton">Son Notlar</button>
            <button onClick={() => setReportView("overview")} className="secondaryButton">Genel</button>
          </div>

          {reportView === "overview" && (
            <Empty icon="📊" text={`Bugünkü başarı: %${report.score}. Toplam ürün fikri: ${report.products}. Toplam not: ${report.notes}.`} />
          )}

          {reportView === "latestProducts" && (
            <div className="list">
              {latestProducts.map(p => (
                <article key={p.id} className="card">
                  <div className="cardBody">
                    <strong>{p.name}</strong>
                    <div className="meta">{p.createdAt} · {p.potential}</div>
                    <p className="note">{p.notes || p.productUrl}</p>
                  </div>
                </article>
              ))}
            </div>
          )}

          {reportView === "latestNotes" && (
            <div className="list">
              {latestNotes.map(n => (
                <article key={n.id} className="card">
                  <div className="cardBody">
                    <strong>{n.title}</strong>
                    <div className="meta">{n.createdAt}</div>
                    <p className="note">{n.aiSummary || n.sourceText}</p>
                  </div>
                </article>
              ))}
            </div>
          )}

          <button onClick={onSend} className="primaryButton">📧 Gmail ile Genel Rapor Gönder</button>
        </div>
      );
    }

    function SummaryBox({ value, label, color }) {
      return (
        <div className="summaryBox" style={{ borderColor: color }}>
          <strong style={{ color }}>{value}</strong>
          <span>{label}</span>
        </div>
      );
    }

    function SettingsScreen({ settings, setSettings, google, makeProductSheet, makePlanSheet }) {
      const set = (field, value) => setSettings(prev => ({ ...prev, [field]: value }));

      return (
        <div>
          <div className="settingsCard">
            <h3>📅 Google Takvim & Gmail Bağlantısı</h3>
            <button onClick={google.connected ? google.signOut : google.signIn} className="primaryButton">
              {google.connected ? "🔗 Google Bağlı — Çıkış Yap" : "🔗 Google Hesabına Bağlan"}
            </button>
          </div>

          <div className="settingsCard">
            <h3>📌 Google API Kurulumu</h3>
            <p>Google Cloud Console’da Calendar API, Gmail API, Google Docs API ve Google Sheets API etkin olmalı.</p>
            <p>Authorized JavaScript origins: <b>https://oguzzata29-creator.github.io</b></p>

            <label className="label">Google Client ID</label>
            <input value={settings.clientId} onChange={e => set("clientId", e.target.value)} placeholder="xxxx.apps.googleusercontent.com" className="input" />

            <label className="label">Rapor E-posta Adresi</label>
            <input value={settings.email} onChange={e => set("email", e.target.value)} placeholder="sen@gmail.com" className="input" />
          </div>

          <div className="settingsCard">
            <h3>📋 Günlük Plan Google Sheet</h3>

            <label className="label">Plan Spreadsheet ID</label>
            <input value={settings.planSheetId || ""} onChange={e => set("planSheetId", e.target.value)} placeholder="Günlük Plan Sheet ID" className="input" />

            <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginTop: 12 }}>
              <button onClick={makePlanSheet} className="secondaryButton">+ Yeni Plan Sheet Oluştur</button>
              <button
                onClick={() => set("autoSavePlanToSheet", !settings.autoSavePlanToSheet)}
                className="secondaryButton"
                style={{
                  background: settings.autoSavePlanToSheet ? "#22c55e22" : "#334155",
                  color: settings.autoSavePlanToSheet ? "#22c55e" : "#cbd5e1"
                }}
              >
                {settings.autoSavePlanToSheet ? "✓ Calendar ile Sheet'e de yaz" : "Sheet otomatik kapalı"}
              </button>
            </div>
          </div>

          <div className="settingsCard">
            <h3>🛍️ Ürün Google Sheet</h3>

            <label className="label">Spreadsheet ID</label>
            <input value={settings.productSheetId} onChange={e => set("productSheetId", e.target.value)} placeholder="Google Sheet ID" className="input" />

            <button onClick={makeProductSheet} className="secondaryButton" style={{ marginTop: 12 }}>+ Yeni Ürün Sheet Oluştur</button>
          </div>

          <div className="settingsCard">
            <h3>🤖 AI Ayarları</h3>

            <label className="label">OpenAI API Key</label>
            <input type="password" value={settings.openAiKey} onChange={e => set("openAiKey", e.target.value)} placeholder="sk-..." className="input" />

            <label className="label">AI Model</label>
            <input value={settings.aiModel} onChange={e => set("aiModel", e.target.value)} placeholder="gpt-4o-mini" className="input" />

            <div className="warning">
              ⚠️ Bu GitHub Pages prototipinde API key tarayıcıda tutulur. Yayın aşamasında backend/proxy kullan.
            </div>
          </div>
        </div>
      );
    }

    function Empty({ icon, text }) {
      return (
        <div className="empty">
          <div>{icon}</div>
          <p>{text}</p>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
