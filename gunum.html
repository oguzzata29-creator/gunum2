function App(){const[screen,setScreen]=useState("plan"),[date,setDate]=useState(today()),[blocks,setBlocks]=useState(()=>get(`plan_${today()}`,[])),[notes,setNotes]=useState(()=>get("notes",[])),[products,setProducts]=useState(()=>get("products",[])),[templates,setTemplates]=useState(()=>get("customTemplates",[])),[def,setDef]=useState(()=>get("defaultTemplateId","standart-gun")),[settings,setSettings]=useState(()=>get("settings",{clientId:"",email:"",openAiKey:"",aiModel:"gpt-4o-mini",productSheetId:"",planSheetId:"",autoApplyDefaultPlan:false,autoSavePlanToSheet:true})),[modal,setModal]=useState(null),[toast,setToast]=useState(null),[loading,setLoading]=useState(false),[reportView,setReportView]=useState("overview");

async function saveBlock(block){const n={...block,title:block.title.trim(),note:block.note.trim()};if(!n.title)return notify("Başlık boş olamaz","warning");if(diff(n.start,n.end)<=0)return notify("Bitiş saati başlangıçtan sonra olmalı","warning");if(overlap(blocks,n))return notify("Bu saat aralığında başka blok var","warning");let saved=n;if(google.connected){setLoading(true);try{const c=cat(n.category),eventBody={summary:`${c.emoji} ${n.title}`,description:n.note||"Günüm uygulamasından eklendi",start:{dateTime:dt(date,n.start),timeZone:"Europe/Istanbul"},end:{dateTime:dt(date,n.end),timeZone:"Europe/Istanbul"},colorId:c.googleColorId};if(n.calendarEventId){await api(`https://www.googleapis.com/calendar/v3/calendars/primary/events/${n.calendarEventId}`,google.accessToken,{method:"PUT",body:JSON.stringify(eventBody)});notify("Google Calendar güncellendi ✓")}else{const cr=await api("https://www.googleapis.com/calendar/v3/calendars/primary/events",google.accessToken,{method:"POST",body:JSON.stringify(eventBody)});saved={...n,calendarEventId:cr.id};notify("Google Calendar'a eklendi ✓")}if(settings.autoSavePlanToSheet&&settings.planSheetId){await appendPlan({token:google.accessToken,sheetId:settings.planSheetId,date,block:saved});notify("Calendar + Plan Sheet kaydı tamamlandı ✓")}}catch(e){notify(`Calendar/Sheet hatası: ${e.message}`,"error")}finally{setLoading(false)}}setBlocks(p=>{const exists=p.some(b=>b.id===saved.id),next=exists?p.map(b=>b.id===saved.id?saved:b):[...p,saved];return next.sort((a,b)=>a.start.localeCompare(b.start))});setModal(null)}

async function saveNote(note){setNotes(p=>[{...note,id:uid(),createdAt:now()},...p]);notify("Not kaydedildi ✓")}async function saveDoc(note){if(!google.connected)return notify("Önce Google hesabına bağlan","warning");setLoading(true);try{const title=`Günüm Not — ${note.title||now()}`,content=`${title}\n\nTarih: ${note.createdAt||now()}\n\nOrijinal Metin:\n${note.sourceText||"—"}\n\nAI Özeti:\n${note.aiSummary||"—"}`;await createDoc(google.accessToken,title,content);notify("Google Docs'a kaydedildi ✓")}catch(e){notify(`Docs hatası: ${e.message}`,"error")}finally{setLoading(false)}}async function saveProduct(p){const n={...p,id:uid(),createdAt:now()};if(!n.name.trim())return notify("Ürün adı boş olamaz","warning");setProducts(prev=>[n,...prev]);if(google.connected&&settings.productSheetId){setLoading(true);try{await appendProduct({token:google.accessToken,sheetId:settings.productSheetId,p:n});notify("Ürün Google Sheets'e kaydedildi ✓")}catch(e){notify(`Sheets hatası: ${e.message}`,"error")}finally{setLoading(false)}}else notify("Ürün yerel kaydedildi ✓")}async function makeProductSheet(){if(!google.connected)return notify("Önce Google hesabına bağlan","warning");setLoading(true);try{const id=await createProductSheet(google.accessToken);setSettings(p=>({...p,productSheetId:id}));notify("Ürünler için Sheet oluşturuldu ✓")}catch(e){notify(`Sheet hatası: ${e.message}`,"error")}finally{setLoading(false)}}async function makePlanSheet(){if(!google.connected)return notify("Önce Google hesabına bağlan","warning");setLoading(true);try{const id=await createPlanSheet(google.accessToken);setSettings(p=>({...p,planSheetId:id}));notify("Günlük plan Sheet oluşturuldu ✓")}catch(e){notify(`Plan Sheet hatası: ${e.message}`,"error")}finally{setLoading(false)}}async function sendReport(){if(!google.connected)return notify("Önce Google hesabına bağlan","warning");if(!settings.email)return notify("Rapor e-posta adresi eksik","warning");setLoading(true);try{const html=`<div style="font-family:Arial;padding:28px"><h1>Günüm Raporu</h1><p>${fmt(date)}</p><ul><li>Planlanan: ${report.total}</li><li>Tamamlanan: ${report.completed}</li><li>Kaçırılan: ${report.missed}</li><li>Başarı: ${report.score}%</li><li>Not: ${report.notes}</li><li>Ürün: ${report.products}</li></ul></div>`,raw=[`To: ${settings.email}`,"Content-Type: text/html; charset=utf-8","MIME-Version: 1.0",`Subject: =?utf-8?B?${b64(`Günüm Rapor — ${date}`)}?=`,"",html].join("\n");await api("https://gmail.googleapis.com/gmail/v1/users/me/messages/send",google.accessToken,{method:"POST",body:JSON.stringify({raw:b64(raw)})});notify("Rapor Gmail ile gönderildi ✓")}catch(e){notify(`Mail hatası: ${e.message}`,"error")}finally{setLoading(false)}}
return <div className="shell"><div className="window"><div className="bar"><span className="dot" style={{background:"#ff5f57"}}/><span className="dot" style={{background:"#febc2e"}}/><span className="dot" style={{background:"#28c840"}}/></div><div className="app">{toast&&<Toast toast={toast}/>} {loading&&<Loading/>}<section className="dateBar"><button onClick={()=>shift(-1)} className="dateBtn">‹</button><input value={date} onChange={e=>setDate(e.target.value)} type="date" className="dateInput"/><button onClick={()=>shift(1)} className="dateBtn">›</button></section><nav className="tabs">{[["plan","📋","Plan"],["notes","📸","Notlar"],["products","🛍️","Ürünler"],["report","📊","Rapor"],["settings","⚙️","Ayarlar"]].map(([id,emoji,label])=><button key={id} onClick={()=>setScreen(id)} className={`tab ${screen===id?"active":""}`}><span style={{fontSize:22}}>{emoji}</span><small>{label}</small></button>)}</nav><main className="main">{screen==="plan"&&<PlanScreen blocks={blocks} report={report} onAdd={openNew} onEdit={b=>setModal({...b})} onDelete={delBlock} onStatus={status} onApplyTemplate={applyTemplate} onSaveTemplate={saveTemplate} autoDefault={settings.autoApplyDefaultPlan} onToggleAutoDefault={toggleAuto} templates={[...READY,...templates]} defaultTemplateId={def} setDefaultTemplateId={setDef}/>} {screen==="notes"&&<NotesScreen notes={notes} setNotes={setNotes} settings={settings} onSave={saveNote} onSaveDoc={saveDoc} setLoading={setLoading} notify={notify}/>} {screen==="products"&&<ProductsScreen products={products} onSave={saveProduct} onDelete={id=>setProducts(p=>p.filter(x=>x.id!==id))} makeProductSheet={makeProductSheet} hasSheet={!!settings.productSheetId}/>} {screen==="report"&&<ReportScreen notes={notes} products={products} report={report} reportView={reportView} setReportView={setReportView} onSend={sendReport}/>} {screen==="settings"&&<SettingsScreen settings={settings} setSettings={setSettings} google={google} makeProductSheet={makeProductSheet} makePlanSheet={makePlanSheet}/>}</main>{modal&&<BlockModal block={modal} onClose={()=>setModal(null)} onSave={saveBlock} loading={loading}/>}</div></div></div>}
function Toast({toast}){return <div className="toast" style={{background:toast.type==="error"?"#ef4444":toast.type==="warning"?"#f59e0b":"#22c55e"}}>{toast.message}</div>}function Loading(){return <div className="loading"><div>İşleniyor...</div></div>}
function PlanScreen({blocks,report,onAdd,onEdit,onDelete,onStatus,onApplyTemplate,onSaveTemplate,autoDefault,onToggleAutoDefault,templates,defaultTemplateId,setDefaultTemplateId}){return <div><div className="top"><span>{blocks.length} aktivite · {Math.floor(report.totalMinutes/60)}s {report.totalMinutes%60}dk planlandı</span><button onClick={onSaveTemplate} className="secondary">💾 Şablon Kaydet</button></div><div className="panel"><h3>⚡ Gün Şablonu</h3><div className="grid2"><select value={defaultTemplateId} onChange={e=>setDefaultTemplateId(e.target.value)} className="input">{templates.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}</select><button onClick={()=>onApplyTemplate(defaultTemplateId)} className="secondary">Bugüne Uygula</button></div><button onClick={onToggleAutoDefault} className="primary" style={{background:autoDefault?"#22c55e22":"#334155",color:autoDefault?"#22c55e":"#cbd5e1"}}>{autoDefault?"✓ Boş günlere otomatik uygula açık":"Boş günlere otomatik uygula"}</button></div>{!blocks.length?<Empty icon="🗓️" text="Henüz plan yok. Hazır şablonu bugüne uygulayabilir veya yeni blok ekleyebilirsin."/>:<div className="list">{blocks.map(b=><BlockCard key={b.id} block={b} onEdit={()=>onEdit(b)} onDelete={()=>onDelete(b)} onStatus={onStatus}/>)}</div>}<button onClick={onAdd} className="primary">+ Yeni Blok Ekle</button></div>}
function BlockCard({block,onEdit,onDelete,onStatus}){const c=cat(block.category),bc=block.status===true?"#22c55e":block.status===false?"#ef4444":c.color;return <article className="card" style={{borderLeftColor:bc,opacity:block.status===false?.72:1}}><div className="status"><button onClick={()=>onStatus(block.id,true)} style={{borderColor:"#22c55e",background:block.status===true?"#22c55e":"transparent"}}>✓</button><button onClick={()=>onStatus(block.id,false)} style={{borderColor:"#ef4444",background:block.status===false?"#ef4444":"transparent"}}>✕</button></div><div className="body"><strong>{c.emoji} {block.title}</strong><div className="meta">{block.start} – {block.end} <span style={{color:c.color}}>{dur(block.start,block.end)}</span> {block.calendarEventId?"📅":""}</div>{block.note&&<p className="note">{block.note}</p>}</div><div className="actions"><button onClick={onEdit} className="icon">✏️</button><button onClick={onDelete} className="icon" style={{color:"#ef4444"}}>🗑️</button></div></article>}
function BlockModal({block,onClose,onSave,loading}){const[form,setForm]=useState(block),set=(f,v)=>setForm(p=>({...p,[f]:v}));return <div className="modal"><div className="modalBox"><div className="modalHead"><h3>{block.title?"Bloğu Düzenle":"Yeni Blok"}</h3><button onClick={onClose} className="close">✕</button></div><label className="label">Başlık</label><input value={form.title} onChange={e=>set("title",e.target.value)} className="input"/><div className="cols"><div><label className="label">Başlangıç</label><input type="time" value={form.start} onChange={e=>set("start",e.target.value)} className="input"/></div><div><label className="label">Bitiş</label><input type="time" value={form.end} onChange={e=>set("end",e.target.value)} className="input"/></div></div><label className="label">Kategori</label><div className="catGrid">{CATS.map(c=><button key={c.id} onClick={()=>set("category",c.id)} className="pill" style={{borderColor:form.category===c.id?c.color:"transparent",color:form.category===c.id?c.color:"#94a3b8",background:form.category===c.id?`${c.color}22`:"#0f172a"}}>{c.emoji} {c.label}</button>)}</div><label className="label">Not</label><textarea value={form.note} onChange={e=>set("note",e.target.value)} rows="3" className="input"/><div className="modalFoot"><button onClick={onClose} className="secondary">İptal</button><button onClick={()=>onSave(form)} disabled={loading} className="primary">{loading?"Kaydediliyor...":"Kaydet"}</button></div></div></div>}
function NotesScreen({notes,setNotes,settings,onSave,onSaveDoc,setLoading,notify}){const[title,setTitle]=useState(""),[sourceText,setSourceText]=useState(""),[imageFile,setImageFile]=useState(null),[aiSummary,setAiSummary]=useState("");async function analyze(){if(!sourceText.trim()&&!imageFile)return notify("Önce metin yaz veya görsel yükle","warning");setLoading(true);try{setAiSummary(await analyzeAI({apiKey:settings.openAiKey,model:settings.aiModel,text:sourceText,imageFile}));notify("AI özeti hazır ✓")}catch(e){notify(`AI hatası: ${e.message}`,"error")}finally{setLoading(false)}}async function save(){if(!sourceText.trim()&&!aiSummary.trim())return notify("Kaydedilecek not yok","warning");await onSave({title:title||"Kitap Notu",sourceText,aiSummary});setTitle("");setSourceText("");setImageFile(null);setAiSummary("")}return <div><div className="top"><span>{notes.length} not</span></div><div className="drop"><div style={{fontSize:38}}>📸</div><strong>Kitap sayfası görseli yükle veya metin yapıştır</strong><input type="file" accept="image/*" onChange={e=>setImageFile(e.target.files?.[0]||null)}/>{imageFile&&<small>{imageFile.name}</small>}</div><input value={title} onChange={e=>setTitle(e.target.value)} placeholder="Not başlığı" className="input"/><textarea value={sourceText} onChange={e=>setSourceText(e.target.value)} rows="5" placeholder="Okuduğun metni, sözü veya alıntıyı buraya yaz..." className="input" style={{resize:"vertical",marginTop:10}}/><div className="cols"><button onClick={analyze} className="primary">✨ AI Özetle</button><button onClick={save} className="secondary">💾 Kaydet</button></div>{aiSummary&&<div className="result"><h3>AI Özeti</h3><pre style={{whiteSpace:"pre-wrap",fontFamily:"inherit"}}>{aiSummary}</pre></div>}{!notes.length?<Empty icon="📚" text="Henüz not yok."/>:<div className="list">{notes.map(n=><article key={n.id} className="card"><div className="body"><strong>{n.title}</strong><div className="meta">{n.createdAt}</div><p className="note">{n.aiSummary||n.sourceText}</p></div><button onClick={()=>onSaveDoc(n)} className="secondary">Word</button><button onClick={()=>setNotes(p=>p.filter(x=>x.id!==n.id))} className="icon" style={{color:"#ef4444"}}>🗑️</button></article>)}</div>}</div>}
function ProductsScreen({products,onSave,onDelete,makeProductSheet,hasSheet}){const[form,setForm]=useState({...EMPTY_PRODUCT}),set=(f,v)=>setForm(p=>({...p,[f]:v}));function submit(){onSave(form);setForm({...EMPTY_PRODUCT})}return <div><div className="top"><span>{products.length} ürün kaydedildi</span><button onClick={makeProductSheet} className="secondary">{hasSheet?"Sheets bağlı":"+ Sheet Oluştur"}</button></div><div className="form"><label className="label">Ürün adı</label><input value={form.name} onChange={e=>set("name",e.target.value)} className="input"/><label className="label">Sosyal medya linki</label><input value={form.socialUrl} onChange={e=>set("socialUrl",e.target.value)} className="input"/><label className="label">Ürün / tedarik linki</label><input value={form.productUrl} onChange={e=>set("productUrl",e.target.value)} className="input"/><div className="cols"><div><label className="label">Pazaryeri</label><input value={form.marketplace} onChange={e=>set("marketplace",e.target.value)} className="input"/></div><div><label className="label">Viral puanı</label><input value={form.viralScore} onChange={e=>set("viralScore",e.target.value)} className="input"/></div></div><label className="label">Potansiyel</label><select value={form.potential} onChange={e=>set("potential",e.target.value)} className="input"><option>Düşük</option><option>Orta</option><option>Yüksek</option><option>Çok Yüksek</option></select><label className="label">Not</label><textarea value={form.notes} onChange={e=>set("notes",e.target.value)} rows="3" className="input"/><button onClick={submit} className="primary">+ Ürünü Kaydet</button></div>{!products.length?<Empty icon="🛍️" text="Henüz ürün yok."/>:<div className="list">{products.map(p=><article key={p.id} className="card" style={{borderLeftColor:p.potential==="Yüksek"||p.potential==="Çok Yüksek"?"#22c55e":"#f59e0b"}}><div className="body"><strong>{p.name}</strong><div className="meta">{p.createdAt} · {p.marketplace||"Pazaryeri yok"} · Viral: {p.viralScore||"—"} · {p.potential}</div><p className="note">{p.notes||p.productUrl||p.socialUrl}</p></div><button onClick={()=>onDelete(p.id)} className="icon" style={{color:"#ef4444"}}>🗑️</button></article>)}</div>}</div>}
function ReportScreen({notes,products,report,reportView,setReportView,onSend}){return <div><div className="summary"><Box label="Tamamlandı" value={report.completed} color="#22c55e"/><Box label="Ürün" value={report.products} color="#60a5fa"/><Box label="Not" value={report.notes} color="#f59e0b"/></div><div className="cols"><button onClick={()=>setReportView("latestProducts")} className="secondary">Son Ürünler</button><button onClick={()=>setReportView("latestNotes")} className="secondary">Son Notlar</button></div>{reportView==="overview"&&<Empty icon="📊" text={`Bugünkü başarı: %${report.score}. Toplam ürün fikri: ${report.products}. Toplam not: ${report.notes}.`}/>} {reportView==="latestProducts"&&<div className="list">{products.slice(0,5).map(p=><article key={p.id} className="card"><div className="body"><strong>{p.name}</strong><div className="meta">{p.createdAt} · {p.potential}</div><p className="note">{p.notes||p.productUrl}</p></div></article>)}</div>} {reportView==="latestNotes"&&<div className="list">{notes.slice(0,5).map(n=><article key={n.id} className="card"><div className="body"><strong>{n.title}</strong><div className="meta">{n.createdAt}</div><p className="note">{n.aiSummary||n.sourceText}</p></div></article>)}</div>}<button onClick={onSend} className="primary">📧 Gmail ile Genel Rapor Gönder</button></div>}
function Box({value,label,color}){return <div className="box" style={{borderColor:color}}><strong style={{color}}>{value}</strong><span>{label}</span></div>}
function SettingsScreen({settings,setSettings,google,makeProductSheet,makePlanSheet}){const set=(f,v)=>setSettings(p=>({...p,[f]:v}));return <div><div className="settings"><h3>📅 Google Takvim & Gmail Bağlantısı</h3><button onClick={google.connected?google.signOut:google.signIn} className="primary">{google.connected?"🔗 Google Bağlı — Çıkış Yap":"🔗 Google Hesabına Bağlan"}</button></div><div className="settings"><h3>📌 Google API Kurulumu</h3><p>Calendar API, Gmail API, Google Docs API ve Google Sheets API etkin olmalı.</p><p>Authorized JavaScript origins: <b>https://oguzzata29-creator.github.io</b></p><label className="label">Google Client ID</label><input value={settings.clientId} onChange={e=>set("clientId",e.target.value)} className="input"/><label className="label">Rapor E-posta Adresi</label><input value={settings.email} onChange={e=>set("email",e.target.value)} className="input"/></div><div className="settings"><h3>📋 Günlük Plan Google Sheet</h3><label className="label">Plan Spreadsheet ID</label><input value={settings.planSheetId||""} onChange={e=>set("planSheetId",e.target.value)} className="input"/><button onClick={makePlanSheet} className="secondary">+ Yeni Plan Sheet Oluştur</button><button onClick={()=>set("autoSavePlanToSheet",!settings.autoSavePlanToSheet)} className="secondary" style={{marginLeft:8,background:settings.autoSavePlanToSheet?"#22c55e22":"#334155",color:settings.autoSavePlanToSheet?"#22c55e":"#cbd5e1"}}>{settings.autoSavePlanToSheet?"✓ Calendar ile Sheet'e de yaz":"Sheet otomatik kapalı"}</button></div><div className="settings"><h3>🛍️ Ürün Google Sheet</h3><label className="label">Spreadsheet ID</label><input value={settings.productSheetId} onChange={e=>set("productSheetId",e.target.value)} className="input"/><button onClick={makeProductSheet} className="secondary">+ Yeni Ürün Sheet Oluştur</button></div><div className="settings"><h3>🤖 AI Ayarları</h3><label className="label">OpenAI API Key</label><input type="password" value={settings.openAiKey} onChange={e=>set("openAiKey",e.target.value)} className="input"/><label className="label">AI Model</label><input value={settings.aiModel} onChange={e=>set("aiModel",e.target.value)} className="input"/><div className="warning">⚠️ GitHub Pages prototipinde API key tarayıcıda tutulur. Yayın aşamasında backend/proxy kullan.</div></div></div>}
function Empty({icon,text}){return <div className="empty"><div>{icon}</div><p>{text}</p></div>}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script></body></html>
